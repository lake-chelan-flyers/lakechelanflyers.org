---
layout: default
---

{% assign filter = page.header.overlay_filter | default: 0.5 %}
<div class="page__hero--overlay"
  style="background-image: linear-gradient(rgba(0, 0, 0, {{ filter }}), rgba(0, 0, 0, {{ filter }})), url('{{ page.header.overlay_image | relative_url }}');"
>
  <div class="wrapper">
    <h1 id="page-title" class="page__title" itemprop="headline">
      {{ page.title | markdownify | remove: "<p>" | remove: "</p>" }}
    </h1>
    {{ content }}
  </div>
</div>
